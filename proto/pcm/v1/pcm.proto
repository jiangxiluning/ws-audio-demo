syntax = "proto3";

package pcm.v1;

option java_package = "com.demo.pcm.v1";
option java_multiple_files = true;

service PcmProcessor {
  rpc ProcessStream(ProcessRequest) returns (stream ProcessSegment);
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message ProcessRequest {
  bytes pcm_s16le = 1;
  double gain_db = 2;
  double duration_sec = 3;
  int32 input_sample_rate = 4;
  int32 output_sample_rate = 5;
}

message ProcessSegment {
  bytes pcm_s16le = 1;
  int32 segment_index = 2;
  double segment_duration_sec = 3;
  bool is_last = 4;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}
